<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书爆款AI复刻与防风控发布系统 - Demo Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶栏 Header -->
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon">🔥</div>
                <div class="brand-text">
                    <h1>RED AI Studio</h1>
                    <span class="subtitle">小红书爆款抓取 · 火山 Agent Plan 复刻 · 人工审核 · 插件安全发布</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-badge">
                    <span class="dot green"></span>
                    <span>火山 Agent Plan: 就绪</span>
                </div>
                <div class="stat-badge info">
                    <span id="pending-count">待审核: 0</span>
                </div>
                <div class="stat-badge success">
                    <span id="approved-count">待发布: 0</span>
                </div>
            </div>
        </header>

        <!-- 主界面容器 -->
        <main class="main-content">
            <!-- 模型配置栏 -->
            <section class="section-card model-config-card">
                <div class="section-title">
                    <h2>⚙️ 模型配置</h2>
                    <span class="tip">页面配置优先，未填写的字段使用 .env 默认值</span>
                </div>
                <form id="model-config-form" class="model-config-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="model-base-url">Base URL</label>
                            <input type="url" id="model-base-url" autocomplete="url" placeholder="https://ark.cn-beijing.volces.com/api/plan/v3" required>
                        </div>
                        <div class="input-group">
                            <label for="model-api-key">API Key</label>
                            <input type="password" id="model-api-key" autocomplete="new-password" placeholder="留空则使用 .env 配置">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="model-name">文本模型（model）</label>
                            <input type="text" id="model-name" placeholder="doubao-seed-2.0-pro" required>
                        </div>
                        <div class="input-group">
                            <label for="model-image-name">生图模型（image model）</label>
                            <input type="text" id="model-image-name" placeholder="doubao-seedream-5.0-lite" required>
                        </div>
                    </div>
                    <div class="form-grid model-config-secondary-grid">
                        <div class="input-group">
                            <label for="model-image-size">生图尺寸</label>
                            <input type="text" id="model-image-size" placeholder="2K" required>
                        </div>
                        <div class="model-config-meta" id="model-config-meta" aria-live="polite">
                            正在读取当前生效配置...
                        </div>
                    </div>
                    <div class="form-actions model-config-actions">
                        <button type="button" class="btn btn-secondary" id="btn-reset-model-config">
                            ↺ 恢复 .env 默认
                        </button>
                        <button type="submit" class="btn btn-primary" id="btn-save-model-config">
                            <span class="icon">✓</span> 保存模型配置
                        </button>
                    </div>
                </form>
            </section>

            <!-- Tabs 选项卡 -->
            <div class="tab-navigation">
                <button class="tab-btn active" data-tab="review">📝 待人工审核卡片 (<span id="tab-review-num">0</span>)</button>
                <button class="tab-btn" data-tab="queue">🚀 插件发布队列 (<span id="tab-queue-num">0</span>)</button>
                <button class="tab-btn" data-tab="all">📚 爆款素材库</button>
            </div>

            <!-- TAB 1: 待审核卡片流 -->
            <section id="tab-content-review" class="tab-panel active">
                <div id="review-cards-list" class="cards-container">
                    <!-- 动态渲染 review cards -->
                    <div class="empty-state">加载数据中...</div>
                </div>
            </section>

            <!-- TAB 2: 插件发布队列 -->
            <section id="tab-content-queue" class="tab-panel">
                <div class="queue-notice">
                    <div class="notice-icon">🛡️</div>
                    <div class="notice-text">
                        <h4>插件防风控发布说明</h4>
                        <p>已审核通过的帖子将自动加入待发布队列。请保持你的浏览器已安装 <b>RED AI Auto-Publisher 插件</b>，并打开小红书创作者平台 (<code>creator.xiaohongshu.com</code>)，插件将模拟人工按键、逐字输入并挂载图片，全流程无 API 发包风控风险。</p>
                    </div>
                </div>
                <div id="queue-cards-list" class="queue-container">
                    <!-- 动态渲染发布队列 -->
                </div>
            </section>

            <!-- TAB 3: 全部爆款素材库 -->
            <section id="tab-content-all" class="tab-panel">
                <div id="all-cards-list" class="cards-container">
                    <!-- 动态渲染所有卡片 -->
                </div>
            </section>
        </main>
    </div>

    <!-- 弹窗通知/提示 Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="/static/post_diff.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
