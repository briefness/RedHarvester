services:
  xhs-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xhs_ai_backend
    ports:
      - "8888:8000"
    environment:
      - PORT=8000
      - VOLC_API_KEY=${VOLC_API_KEY:-}
      - VOLC_BASE_URL=${VOLC_BASE_URL:-https://ark.cn-beijing.volces.com/api/plan/v3}
      - VOLC_MODEL_NAME=${VOLC_MODEL_NAME:-doubao-seed-2.0-pro}
      - VOLC_IMAGE_MODEL_NAME=${VOLC_IMAGE_MODEL_NAME:-doubao-seedream-5.0-lite}
      - VOLC_IMAGE_SIZE=${VOLC_IMAGE_SIZE:-2K}
      - DATABASE_PATH=/app/data/data.db
    volumes:
      - ./backend/data.db:/app/data/data.db
      - ./backend/generated_media:/app/backend/generated_media
    restart: always
